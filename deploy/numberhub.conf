# numberhub.io nginx vhost — lives on the server at /etc/nginx/conf.d/numberhub.conf
# Serves the static export from /opt/numberhub-site/out over HTTPS, with a
# branded 404 and security headers. HTTPS uses a Cloudflare Origin Certificate
# (/etc/ssl/cloudflare/numberhub.{pem,key}) so Cloudflare SSL mode can be
# "Full (strict)" — encrypted AND validated edge<->origin.

# NOTE: the Cloudflare zone currently uses FLEXIBLE SSL (edge->origin over
# plain HTTP :80), so this block must SERVE content — a :80 redirect to https
# creates an infinite loop at the edge. Once the zone is switched to
# "Full (strict)" (origin cert is already installed), replace this body with:
#   return 301 https://numberhub.io$request_uri;
server {
    listen 80;
    listen [::]:80;
    server_name numberhub.io;
    root /opt/numberhub-site/out;
    index index.html;
    absolute_redirect off;
    include /etc/nginx/snippets/numberhub-headers.conf;
    error_page 404 /404.html;
    location = /404.html { internal; }
    location / {
        try_files $uri $uri/ =404;
        include /etc/nginx/snippets/numberhub-headers.conf;
        add_header Cache-Control "no-cache" always;
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        include /etc/nginx/snippets/numberhub-headers.conf;
        add_header Cache-Control "no-cache" always;
    }
    location /_next/static/ {
        include /etc/nginx/snippets/numberhub-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# www -> apex over plain HTTP (host changes, so no loop under Flexible SSL).
server {
    listen 80;
    listen [::]:80;
    server_name www.numberhub.io;
    return 301 https://numberhub.io$request_uri;
}

# www -> apex (one canonical host; canonicals/sitemap all use the apex).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.numberhub.io;
    ssl_certificate     /etc/ssl/cloudflare/numberhub.pem;
    ssl_certificate_key /etc/ssl/cloudflare/numberhub.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 301 https://numberhub.io$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name numberhub.io;
    root /opt/numberhub-site/out;
    index index.html;

    # Cloudflare Origin Certificate (trusted by Cloudflare's edge; 15-yr validity).
    ssl_certificate     /etc/ssl/cloudflare/numberhub.pem;
    ssl_certificate_key /etc/ssl/cloudflare/numberhub.key;   # chmod 600
    ssl_protocols TLSv1.2 TLSv1.3;

    # Slash-normalizing directory redirects must be relative (scheme-proof):
    # otherwise nginx emits Location: http://… behind the proxy, creating an
    # insecure hop for every slash-less inbound link.
    absolute_redirect off;

    include /etc/nginx/snippets/numberhub-headers.conf;
    error_page 404 /404.html;
    location = /404.html { internal; }

    # HTML: always revalidate so a deploy can't leave stale pages pointing at
    # deleted hashed chunks. (add_header in a location suppresses inherited
    # server-level headers, so re-include the security snippet.)
    location / {
        try_files $uri $uri/ =404;
        include /etc/nginx/snippets/numberhub-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Web app manifest needs its spec MIME type (nginx default lacks .webmanifest).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        include /etc/nginx/snippets/numberhub-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    location /_next/static/ {
        include /etc/nginx/snippets/numberhub-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
