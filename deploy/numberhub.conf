# numberhub.io nginx vhost — lives on the server at /etc/nginx/conf.d/numberhub.conf
# Serves the static export from /opt/numberhub-site/out with a branded 404 and security headers.
server {
    listen 80;
    listen [::]:80;
    server_name numberhub.io www.numberhub.io;
    root /opt/numberhub-site/out;
    index index.html;

    include /etc/nginx/snippets/numberhub-headers.conf;

    error_page 404 /404.html;
    location = /404.html { internal; }
    location / { try_files $uri $uri/ =404; }
    location /_next/static/ {
        include /etc/nginx/snippets/numberhub-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# NOTE: HTTPS (listen 443 + certbot) is added once Cloudflare DNS points the
# A records at this origin with the proxy disabled (grey cloud). Run:
#   certbot --nginx -d numberhub.io -d www.numberhub.io
